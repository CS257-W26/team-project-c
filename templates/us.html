<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WattWatch USA – All US Data</title>
    <link rel="stylesheet" href="../static/us_style.css">
    <link rel="stylesheet" href="{{url_for('static',filename='main_style.css')}}">
</head>

<body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    {% include 'header.html' %}
    <div id="wrapper">
    <main id="main-content">

        <h1>United States Data</h1>

        <div class="content-wrapper">

            <!-- Controls + Data -->
            <section class="centered-section" aria-labelledby="filter-heading">
                
                <h2 id="filter-heading">Get graph:</h2>

                <form method="GET">
                    <div>
                        <label for="graph-select">Choose a set of data</label>
                        <select 
                            id="graph-select"
                            name="graph_type"
                            required
                            aria-describedby="data-description"
                        >
                            <option value="" disabled {% if not selected_data %}selected{% endif %}>
                                Select what data you want to see
                            </option>

                            {% for i in data_options %}
                                <option value="{{ i }}"
                                    {% if i == selected_data %}selected{% endif %}>
                                    {{ i }}
                                </option>
                            {% endfor %}
                        </select>

                        <p id="data-description">
                            Select a set of data to display.
                        </p>
                    </div>

                    <button type="submit">Update</button>
                </form>
                  {% if plot_png %}
                <img
                    class="plot-img"
                    src="{{ plot_png }}"
                    alt="Bar chart of average electricity price by sector"
                    >
                {% else %}
                    <p>No data loaded. Please select a set of data.</p>
                {% endif %}
        </div>
    </main>
</div>
</body>
</html>
